<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export | Bhindi AI Knowledge Builder</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --accent: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #0f172a; /* Deep dark base */
        }

        /* Liquid Animated Background */
        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            background: linear-gradient(135deg, #064e3b 0%, #0f172a 100%);
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(50%, 40%) scale(1.2); }
        }

        /* Glass Container */
        .glass-container {
            width: 90%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tutorial-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .tutorial-card h3 {
            margin-top: 0;
            color: var(--accent);
        }

        .tutorial-card ol {
            padding-left: 20px;
            margin-bottom: 0;
        }

        /* Buttons */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-html {
            background: white;
            color: #0f172a;
        }

        .btn-json {
            background: var(--accent);
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active { transform: translateY(0); }

        @media (max-width: 480px) {
            .button-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob"></div>
    </div>

    <div class="glass-container">
        <h1 id="projectName">Bhindi AI</h1>
        <p style="opacity: 0.8;">Knowledge Build Successful</p>

        <div class="tutorial-card">
            <h3>How to use:</h3>
            <ol>
                <li>Download the <strong>JSON</strong> file to use as the brain for your AI model.</li>
                <li>Download the <strong>HTML</strong> file if you want a ready-to-use tester interface.</li>
                <li>Upload the JSON into your Bhindi AI Dashboard under 'Knowledge Settings'.</li>
            </ol>
        </div>

        <div class="button-group">
            <button class="btn btn-html" onclick="downloadHTML()">
                Download HTML
            </button>
            <button class="btn btn-json" onclick="downloadJSON()">
                Download JSON
            </button>
        </div>
    </div>

    <script>
        // Retrieve project name from previous session/URL (Mocked for this page)
        const name = localStorage.getItem('bhindi_project_name') || "Bhindi AI Project";
        document.getElementById('projectName').innerText = name;

        // Retrieve the generated JSON data from the previous step
        const knowledgeData = JSON.parse(localStorage.getItem('bhindi_last_json') || "[]");

        function downloadJSON() {
            if (knowledgeData.length === 0) return alert("No data found to download.");
            const blob = new Blob([JSON.stringify(knowledgeData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name.toLowerCase().replace(/\s+/g, '_')}.json`;
            a.click();
        }

        function downloadHTML() {
            // Generates a simple standalone HTML file that can read the JSON
            const htmlContent = `
<!DOCTYPE html>
<html>
<head><title>AI Tester - ${name}</title></head>
<body style="font-family:sans-serif; padding:50px; background:#f4f4f4;">
    <h2>${name} Knowledge Tester</h2>
    <p>This is a local preview of your knowledge base.</p>
    <div style="background:white; padding:20px; border-radius:10px;">
        <pre>${JSON.stringify(knowledgeData, null, 2)}</pre>
    </div>
</body>
</html>`;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tester_${name.toLowerCase().replace(/\s+/g, '_')}.html`;
            a.click();
        }
    </script>
</body>
</html>
