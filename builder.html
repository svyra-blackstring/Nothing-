<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate AI UI Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CAF50;
            --ai-bubble: #ffffff;
            --chat-bg: #f0fdf4;
            --bar-bg: #ffffff;
            --radius: 20px;
            --font-size: 15px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #dcfce7;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* MAIN CARD */
        #main-card {
            width: 95%;
            max-width: 400px;
            height: 75vh;
            background: var(--chat-bg);
            margin-top: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(255,255,255,0.5);
            position: relative;
        }

        .chat-area { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .bubble {
            padding: 14px 18px;
            font-size: var(--font-size);
            border-radius: var(--radius);
            max-width: 85%;
        }

        .ai-msg { background: var(--ai-bubble); color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* INTERACTIVE CHAT BAR */
        .chat-bar-container {
            padding: 20px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }

        #chat-bar-preview {
            flex: 1;
            height: 50px;
            background: var(--bar-bg);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: #000; /* Black text */
            font-size: 14px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        #send-btn-preview {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000; /* Force Black Icons */
            font-size: 20px;
        }

        /* TOASTER */
        #toaster {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border-radius: 30px 30px 0 0;
            padding: 25px;
            transition: bottom 0.4s ease;
            z-index: 1000;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        #toaster.active { bottom: 0; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .control-item { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 700; color: #166534; }

        .icon-grid { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .icon-opt { 
            padding: 10px; background: #eee; border-radius: 10px; cursor: pointer; font-size: 20px;
        }

        input { padding: 10px; border-radius: 10px; border: 1px solid #ddd; }

        .export-btn {
            margin-top: 20px; width: 100%; padding: 16px; border-radius: 15px;
            background: #166534; color: white; border: none; font-weight: 700;
        }

    </style>
</head>
<body>

    <div style="margin-top:20px; font-size:12px; font-weight:700; color:#166534">TAP ANY PART TO EDIT</div>

    <div id="main-card">
        <div class="chat-area" onclick="openToaster('Background', 'bg')">
            <div class="bubble ai-msg" onclick="openToaster('AI Bubble', 'ai', event)">
                <span id="welcome-val">What can I help you with today?</span>
            </div>
            <div class="bubble user-msg" onclick="openToaster('Theme Color', 'user', event)">
                Tap me!
            </div>
        </div>

        <div class="chat-bar-container" onclick="openToaster('Chat Bar', 'bar', event)">
            <div id="chat-bar-preview">
                <span id="placeholder-val">Chat here...</span>
            </div>
            <div id="send-btn-preview" onclick="openToaster('Icon Style', 'icon', event)">
                <span id="current-icon">🚀</span>
            </div>
        </div>
    </div>

    <div id="toaster">
        <div style="display:flex; justify-content:space-between">
            <h3 id="toaster-title">Settings</h3>
            <span onclick="closeToaster()" style="cursor:pointer; font-weight:bold">DONE</span>
        </div>
        
        <div class="control-grid">
            <div class="control-item" id="text-input-box">
                <label>Text Content</label>
                <input type="text" id="edit-text" oninput="apply()">
            </div>
            <div class="control-item">
                <label>Color</label>
                <input type="color" id="edit-color" oninput="apply()">
            </div>
            <div class="control-item">
                <label>Corner Roundness</label>
                <input type="range" id="edit-radius" min="0" max="40" oninput="apply()">
            </div>
            <div class="control-item">
                <label>Font Size</label>
                <input type="range" id="edit-font" min="12" max="22" oninput="apply()">
            </div>
        </div>

        <div id="icon-selector" style="display:none; margin-top:15px;">
            <label>Select Icon</label>
            <div class="icon-grid">
                <div class="icon-opt" onclick="setIcon('🚀')">🚀</div>
                <div class="icon-opt" onclick="setIcon('✈️')">✈️</div>
                <div class="icon-opt" onclick="setIcon('⚡')">⚡</div>
                <div class="icon-opt" onclick="setIcon('✨')">✨</div>
                <div class="icon-opt" onclick="setIcon('🔥')">🔥</div>
                <div class="icon-opt" onclick="setIcon('▶️')">▶️</div>
                <div class="icon-opt" onclick="setIcon('Send')">💬</div>
            </div>
        </div>

        <button class="export-btn" onclick="exportHTML()">Download HTML</button>
    </div>

    <script>
        let mode = '';

        function openToaster(title, type, e) {
            if(e) e.stopPropagation();
            mode = type;
            document.getElementById('toaster-title').innerText = title;
            document.getElementById('toaster').classList.add('active');
            
            // Show/Hide specific controls
            document.getElementById('text-input-box').style.display = (type==='ai' || type==='bar') ? 'flex' : 'none';
            document.getElementById('icon-selector').style.display = (type==='icon') ? 'block' : 'none';

            if(type === 'ai') document.getElementById('edit-text').value = document.getElementById('welcome-val').innerText;
            if(type === 'bar') document.getElementById('edit-text').value = document.getElementById('placeholder-val').innerText;
        }

        function closeToaster() { document.getElementById('toaster').classList.remove('active'); }

        function setIcon(icon) {
            document.getElementById('current-icon').innerText = icon;
        }

        function apply() {
            const color = document.getElementById('edit-color').value;
            const radius = document.getElementById('edit-radius').value + 'px';
            const font = document.getElementById('edit-font').value + 'px';
            const text = document.getElementById('edit-text').value;

            if(mode === 'ai') {
                document.documentElement.style.setProperty('--ai-bubble', color);
                document.getElementById('welcome-val').innerText = text;
            } else if(mode === 'user' || mode === 'icon') {
                document.documentElement.style.setProperty('--primary', color);
            } else if(mode === 'bg') {
                document.documentElement.style.setProperty('--chat-bg', color);
            } else if(mode === 'bar') {
                document.documentElement.style.setProperty('--bar-bg', color);
                document.getElementById('placeholder-val').innerText = text;
            }

            document.documentElement.style.setProperty('--radius', radius);
            document.documentElement.style.setProperty('--font-size', font);
        }

        function exportHTML() {
            const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary');
            const aiBg = getComputedStyle(document.documentElement).getPropertyValue('--ai-bubble');
            const chatBg = getComputedStyle(document.documentElement).getPropertyValue('--chat-bg');
            const barBg = getComputedStyle(document.documentElement).getPropertyValue('--bar-bg');
            const radius = getComputedStyle(document.documentElement).getPropertyValue('--radius');
            const welcome = document.getElementById('welcome-val').innerText;
            const placeholder = document.getElementById('placeholder-val').innerText;
            const icon = document.getElementById('current-icon').innerText;

            const html = `<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1">
            <style>
                body { background: #eee; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family: sans-serif; }
                .ui { width:100%; max-width:400px; height:85vh; background:${chatBg}; border-radius:30px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.1); }
                .area { flex:1; padding:20px; display:flex; flex-direction:column; gap:10px; }
                .b { padding:14px; border-radius:${radius}; max-width:80%; font-size:15px; }
                .ai { background:${aiBg}; align-self:flex-start; border-bottom-left-radius:4px; color:#000; }
                .ur { background:${primary}; color:white; align-self:flex-end; border-bottom-right-radius:4px; }
                .bar-cont { padding:15px; display:flex; gap:10px; }
                .input { flex:1; background:${barBg}; border-radius:${radius}; padding:12px; color:#000; font-size:14px; border:1px solid #eee; }
                .btn { width:45px; height:45px; background:${primary}; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#000; font-size:20px; }
            </style></head><body><div class="ui">
                <div class="area"><div class="b ai">${welcome}</div></div>
                <div class="bar-cont"><div class="input">${placeholder}</div><div class="btn">${icon}</div></div>
            </div></body></html>`;
            
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ai-chat-custom.html';
            a.click();
        }
    </script>
</body>
</html>
